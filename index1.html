    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { width:100%; height:100%; background:#000;
                display:flex; align-items:center; justify-content:center; overflow:hidden; }
    canvas { display:block; touch-action:none; -webkit-user-select:none; }
    #loader { position:fixed; inset:0; background:#000; display:flex;
              flex-direction:column; align-items:center; justify-content:center;
              color:#94dbda; font-family:'Press Start 2P', monospace; font-size:11px;
              letter-spacing:1px; z-index:10; transition:opacity .4s; }
    #loader.hidden { opacity:0; pointer-events:none; }
    #bar-wrap { width:160px; height:6px; background:#222; border-radius:3px; margin-top:16px; }
    #bar { height:6px; width:0%; background:#94dbda; border-radius:3px; transition:width .2s; }
    #char-pick { display:flex; gap:8px; }
    .cpick { width:40px; height:40px; background:#000; border:2px solid #333;
             border-radius:8px; cursor:pointer; image-rendering:pixelated; }
    .cpick.sel { border-color:#94dbda; box-shadow:0 0 10px #94dbda; }
    .cpick-snake { width:40px; height:40px; background:#000; border:2px solid #333;
             border-radius:8px; cursor:pointer; image-rendering:pixelated; }
    .cpick-snake.sel { border-color:#FFD700; box-shadow:0 0 10px #FFD700; }
    #pick-label { color:#94dbda; font-family:'Press Start 2P', monospace; font-size:9px; letter-spacing:1px; }
  </style>
</head>
<body>
<div id="loader">
  <div>PUNK-MAN</div>
  <div id="bar-wrap"><div id="bar"></div></div>
</div>
<canvas id="c"></canvas>
<button id="snd-btn" style="position:fixed; top:6px; left:8px; z-index:30;
  background:rgba(0,0,0,0.45); color:#94dbda; border:1px solid #94dbda;
  border-radius:6px; font-size:18px; line-height:1; padding:5px 8px;
  cursor:pointer; -webkit-user-select:none; user-select:none;">🔊</button>
<button id="joy-select-btn" style="position:fixed; top:6px; left:52px; z-index:45;
  background:rgba(0,0,0,0.45); color:#94dbda; border:1px solid #94dbda;
  border-radius:6px; font-size:18px; line-height:1; padding:5px 8px;
  cursor:pointer; -webkit-user-select:none; user-select:none;">🕹️</button>

<!-- INTRO overlay -->
<div id="intro-overlay" style="
  position:fixed; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:flex-start; pointer-events:none; z-index:20;">
  <div id="intro-box" style="
    display:flex; flex-direction:column; align-items:center; gap:6px;
    pointer-events:auto; margin-top:55vh;">
    <div id="pick-label">CHOOSE YOUR HERO</div>
    <div id="char-pick">
      <canvas class="cpick" data-char="punk"    width="64" height="64"></canvas>
      <canvas class="cpick" data-char="pepe"    width="64" height="64"></canvas>
      <canvas class="cpick" data-char="summer"  width="64" height="64"></canvas>
      <canvas class="cpick" data-char="satoshi" width="64" height="64"></canvas>
      <canvas class="cpick" data-char="sgt"     width="64" height="64"></canvas>
    </div>
    <input id="name-input" maxlength="10" placeholder="ENTER NAME"
      style="
        background:#000; color:#94dbda; border:2px solid #94dbda;
        font-family:'Press Start 2P', monospace; font-size:9px; letter-spacing:2px;
        text-align:center; text-transform:uppercase;
        padding:4px 12px; width:170px; outline:none;
        image-rendering:pixelated;">
    <button id="play-btn" style="
        background:#94dbda; color:#000; border:none;
        font-family:'Press Start 2P', monospace; font-size:10px; font-weight:bold;
        letter-spacing:2px; padding:5px 22px; cursor:pointer;
        image-rendering:pixelated;">
      ▶ SEIZE
    </button>
  </div>

// 6529 Logo — SVG px center (76, 851), size 122x167
const LOGO6529 = { cx:76, cy:851, w:122, h:167 };
// Left gray column: SVG x 0-68, right gray column: SVG x 1812-1880
// Logo scroll animation state
const logoAnim = { leftY:0, rightY:0 };

// Scared ghost & SgtMan — same SVG coordinate space
const SCARED = { cx:939.4, cy:1398.4, w:74, h:106 };
const SGTMAN  = { cx:1543, cy:2298, w:157, h:133 };

// ── SgtMan state ──────────────────────────────────────────────────
// Appears ONLY when Brain power-up is collected
// Flies slowly from top-right → left, then disappears
const sgt = { phase:'HIDDEN', x:0, y:0, dx:-1, speed:55, alpha:1 };

function initSgtMan(){
  sgt.phase = 'HIDDEN';
  sgt.alpha = 0;
}

function triggerSgtMan(){
  // Called when Brain power-up collected
  const W = SGTMAN.w * DRAW_SCALE;
  sgt.phase = 'FLYING';
  sgt.x     = CSS_W + W;          // start off-screen right
  sgt.y     = CSS_H * 0.07;       // near top of screen
  sgt.dx    = -1;                  // fly left
  sgt.speed = 55 + Math.random()*30;  // slow, slight variation
  sgt.alpha = 1.0;
}

function updateSgtMan(dt){
  if(sgt.phase !== 'FLYING') return;
  const W = SGTMAN.w * DRAW_SCALE;
  sgt.x += sgt.dx * sgt.speed * dt;
  // Disappear when fully off left edge
  if(sgt.x < -W) sgt.phase = 'HIDDEN';
}

// Items: center in SVG px (same coordinate space)
// ethpoint: vbCenter=(656.2,997.1) → SVG px (707.4,1074.8), size 43×51
// brain:    vbCenter=(429.6,797.1) → SVG px (463.1, 859.2), size 70×84
const ITEM_INFO = {

  brain: { cx:463.1, cy:859.2,  w:70, h:84  },

// ── Canvas ──────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const DPR    = window.devicePixelRatio || 1;
let DRAW_SCALE=1, CSS_W=1, CSS_H=1;

function resize(){
  DRAW_SCALE = Math.min(window.innerWidth/SVG_W, window.innerHeight/SVG_H);
  CSS_W = Math.round(SVG_W*DRAW_SCALE);
  CSS_H = Math.round(SVG_H*DRAW_SCALE);
  canvas.width  = CSS_W*DPR;
  canvas.height = CSS_H*DPR;
  canvas.style.width  = CSS_W+'px';
  canvas.style.height = CSS_H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  if(gameStarted) player.half = Math.round(CHARS.punk.w*DRAW_SCALE/2*0.75);
  if(maskReady) rebuildMask();
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', resize);
if(window.visualViewport){
  window.visualViewport.addEventListener('resize', resize);
}
// Mobile browsers (Safari/Chrome) often report a stale window.innerHeight
// right after load, before the address bar collapses. Re-run resize a
// couple of times shortly after load to catch the settled viewport.
window.addEventListener('load', ()=>{
  setTimeout(resize, 300);
  setTimeout(resize, 1000);
});

// ── Image loading ────────────────────────────────────────────
const imgs = {};
let loadedCount=0;
const KEYS = Object.keys(URIS);
const bar = document.getElementById('bar');

function loadImages(){
  KEYS.forEach(key=>{
    const img = new Image();
    img.onload = img.onerror = ()=>{
      loadedCount++;
      bar.style.width = (loadedCount/KEYS.length*100)+'%';
      if(loadedCount >= KEYS.length) onAllLoaded();
    };
    img.src = URIS[key];
    imgs[key] = img;
  });
}

// ── Draw any SVG asset (character or item) ────────────────────
// All assets share the same 1880×2470 coordinate space.
// We translate to (screenX, screenY) and draw the full SVG
// offset so its center (cx,cy in SVG px) aligns there.
function drawSVG(key, cx, cy, screenX, screenY, flipH, pulse, pulseAmt){
  const dw = SVG_W * DRAW_SCALE;
  const dh = SVG_H * DRAW_SCALE;
  let sc = 1;
  if(pulse) sc = 1 + Math.sin(Date.now()*0.004)*(pulseAmt||0.14);
  ctx.save();
  ctx.translate(screenX, screenY);
  if(flipH) ctx.scale(-1,1);
  if(pulse) ctx.scale(sc,sc);
  ctx.drawImage(imgs[key], -cx*DRAW_SCALE, -cy*DRAW_SCALE, dw, dh);
  ctx.restore();
}

// Shortcuts

// ── Collision mask ───────────────────────────────────────────
let walkMask=null, maskW=0, maskH=0, maskReady=false;

function rebuildMask(){
  // Collision from dedicated layers (2x CSS res):
  //   floor = white "calpestabile" -> walkable where painted
  //   walls = black "confini e muri" -> force-blocked where solid
  const mw=CSS_W*2, mh=CSS_H*2;
  function raster(img){
    const c=document.createElement('canvas'); c.width=mw; c.height=mh;
    const x=c.getContext('2d'); x.imageSmoothingEnabled=false;
    x.drawImage(img,0,0,mw,mh);
    return x.getImageData(0,0,mw,mh).data;
  }
  try{
    const fl=raster(imgs.floor), wl=raster(imgs.walls);
    const n=mw*mh; walkMask=new Uint8Array(n);
    for(let i=0;i<n;i++){
      const a=i*4;
      const onFloor = fl[a+3] > 20;   // any floor paint (handles low opacity)
      const onWall  = wl[a+3] > 90;   // solid wall/border only
      walkMask[i] = (onFloor && !onWall) ? 1 : 0;
    }
    maskW=mw; maskH=mh; maskReady=true;
  }catch(e){
    maskReady=false;
  }
}

function isWalkable(x,y){
  if(!maskReady) return false;          // fail-safe: no mask = nothing walkable
  const px=Math.round(Math.max(0,Math.min(maskW-1, x*2)));
  const py=Math.round(Math.max(0,Math.min(maskH-1, y*2)));
  return walkMask[py*maskW+px]===1;
}

// Good spot: walkable at center + 4 side probes (item fully inside white)
function isGoodSpot(x,y,m){
  return isWalkable(x,y) && isWalkable(x-m,y) && isWalkable(x+m,y)
                          && isWalkable(x,y-m) && isWalkable(x,y+m);
}

// Sub-step movement — never skips walls
function tryMove(x,y,dx,dy,dist,half){
  const steps=Math.ceil(dist), sx=dx*(dist/steps), sy=dy*(dist/steps);
  let cx=x, cy=y; const s=half*0.70;
  for(let i=0;i<steps;i++){
    const nx=cx+sx, ny=cy+sy; let blocked;
    if(dx!==0){const ex=nx+dx*half; blocked=!isWalkable(ex,ny-s)||!isWalkable(ex,ny)||!isWalkable(ex,ny+s);}
    else       {const ey=ny+dy*half; blocked=!isWalkable(nx-s,ey)||!isWalkable(nx,ey)||!isWalkable(nx+s,ey);}
    if(blocked) break; cx=nx; cy=ny;
  }
  return {x:cx, y:cy};
}

// Find nearest good spot within radius
function nearestGood(tx,ty,m,maxR){
  for(let r=0;r<=maxR;r+=2){
    const steps=Math.max(12,Math.round(r*2.5));
    for(let i=0;i<steps;i++){
      const a=i/steps*Math.PI*2;
      const x=Math.round(tx+Math.cos(a)*r);
      const y=Math.round(ty+Math.sin(a)*r);
      if(x>m&&x<CSS_W-m&&y>m&&y<CSS_H-m&&isGoodSpot(x,y,m)) return{x,y};
    }
  }
  return null;
}

let score=0, lives=5, frightTimer=0, ethCollected=0;
let gstate='INTRO';     // INTRO | WAITING | PLAYING | GAME_OVER | WIN

function getLeaderboard(lbKey='punkman_lb'){
  try{ return JSON.parse(localStorage.getItem(lbKey)||'[]'); }
  catch(e){ return []; }

function saveScore(name, sc, opts={}){
  const lbKey = opts.lbKey || 'punkman_lb';
  const eth = opts.eth!==undefined ? opts.eth : ethCollected;
  const lb = getLeaderboard(lbKey);
  lb.push({name: name.toUpperCase().slice(0,10), score: sc, eth: eth});
  lb.sort((a,b)=>b.score-a.score);
  lb.splice(10); // keep top 10
  try{ localStorage.setItem(lbKey, JSON.stringify(lb)); }catch(e){}
}
let firstMoveTime=0;    // timestamp when player first moves
let gameOverTimer=0;    // countdown before auto-restart
const FRIGHT_MS=5500;

// Item hit radius = half the item's visual size in canvas px
function itemRadius(key){
  const it = ITEM_INFO[key];
  return it.w * DRAW_SCALE * 0.55;
}

// ── Player ───────────────────────────────────────────────────
const SPEED_PPS = 180;
const player = {x:0, y:0, half:0, facingLeft:false};
const ghosts  = [
  {key:'red',x:0,y:0}, {key:'pink',x:0,y:0},
  {key:'blue',x:0,y:0},{key:'yellow',x:0,y:0},
];

// ── Input ────────────────────────────────────────────────────
const keys={};
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup',e=>{ keys[e.code]=false; });

const joy={active:false,id:null,baseX:0,baseY:0,knobX:0,knobY:0,dirX:0,dirY:0,R:70,KR:28,DEAD:10};
function touchCSS(t){
  const r=canvas.getBoundingClientRect();
  return{x:(t.clientX-r.left)*(CSS_W/r.width), y:(t.clientY-r.top)*(CSS_H/r.height)};
}
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(joy.active) continue;
    const{x,y}=touchCSS(t);
    {   // joystick activates anywhere on screen
      joy.active=true; joy.id=t.identifier;
      joy.baseX=x; joy.baseY=y; joy.knobX=x; joy.knobY=y;
      joy.dirX=0; joy.dirY=0;
    }
  }
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier!==joy.id) continue;
    const{x,y}=touchCSS(t);
    const dx=x-joy.baseX, dy=y-joy.baseY, dist=Math.sqrt(dx*dx+dy*dy);
    const cl=Math.min(dist,joy.R), ang=Math.atan2(dy,dx);
    joy.knobX=joy.baseX+Math.cos(ang)*cl; joy.knobY=joy.baseY+Math.sin(ang)*cl;
    joy.dirX=dist>joy.DEAD?dx/dist:0; joy.dirY=dist>joy.DEAD?dy/dist:0;
  }
},{passive:false});
function joyEnd(e){
  e.preventDefault();
  for(const t of e.changedTouches)
    if(t.identifier===joy.id){joy.active=false;joy.id=null;joy.dirX=0;joy.dirY=0;}
}
canvas.addEventListener('touchend',   joyEnd,{passive:false});
canvas.addEventListener('touchcancel',joyEnd,{passive:false});

// ── Update ───────────────────────────────────────────────────
function update(dt){
  if(gstate==='GAME_OVER'||gstate==='WIN') return;
  const safeDt=Math.min(dt,0.05), move=SPEED_PPS*safeDt;
  frightTimer=Math.max(0,frightTimer-dt*1000);

  let dx=0,dy=0;
  if(keys.ArrowLeft ||keys.KeyA) dx=-1;
  if(keys.ArrowRight||keys.KeyD) dx= 1;
  if(keys.ArrowUp   ||keys.KeyW) dy=-1;
  if(keys.ArrowDown ||keys.KeyS) dy= 1;
  if(dx&&dy) dy=0;
  if(joy.active&&(joy.dirX||joy.dirY)){
    if(Math.abs(joy.dirX)>=Math.abs(joy.dirY)){dx=joy.dirX>0?1:-1;dy=0;}
    else{dx=0;dy=joy.dirY>0?1:-1;}
  }
  if(dx||dy){
    if(dx<0) player.facingLeft=true;
    if(dx>0) player.facingLeft=false;
    player._dx=dx; player._dy=dy;  // for predictor ghost
    if(gstate==='WAITING'){
      gstate='PLAYING';
      firstMoveTime=performance.now();
      initGhosts(firstMoveTime);  // start release timers NOW
    }
    const r=tryMove(player.x,player.y,dx,dy,move,player.half);
    player.x=r.x; player.y=r.y;
  }

  // Pickups
  const pR=itemRadius('point')+player.half*0.5;
  const bR=itemRadius('brain')+player.half*0.5;
  for(const p of points)
    if(!p.eaten && Math.hypot(p.x-player.x,p.y-player.y)<pR){
      p.eaten=true; p.respawnAt=performance.now()+12000; score+=10; ethCollected++; sfxEth();
    }
  for(const b of brains)
    if(!b.eaten && !b.blocked && Math.hypot(b.x-player.x,b.y-player.y)<bR){
      b.eaten=true; b.respawnAt=performance.now()+40000; score+=50; frightTimer=FRIGHT_MS; triggerSgtMan(); sfxBrain();
    }

  // ── ETH points: each respawns individually after 12 seconds ────────
  const nowMs = performance.now();
  for(const p of points){
    if(p.eaten && p.respawnAt && nowMs >= p.respawnAt){
      p.eaten = false;
      p.respawnAt = null;
    }
  }
  // ── Brain power-ups: each respawns individually after 69 seconds ──
  for(const b of brains){
    if(b.eaten && b.respawnAt && nowMs >= b.respawnAt){
      b.eaten = false;
      b.respawnAt = null;
      b.blocked = Math.hypot(b.x-player.x, b.y-player.y) < bR; // player standing on it -> don't auto-eat
    }
    if(b.blocked && Math.hypot(b.x-player.x, b.y-player.y) >= bR) b.blocked = false;
  }

  // Ghost AI — only when game is PLAYING
  const now=performance.now();
  if(gstate==='PLAYING'){
    updateGhosts(dt, now);
    checkGhostHits(now);
    updateDangers();
  }
  // SgtMan flies always (decorative, independent of game state)
  updateSgtMan(dt);
  // Logo scroll — always running, deltaTime normalized (10% screen/sec)
  const logoSpd = CSS_H * 0.10 * dt;
  logoAnim.leftY  += logoSpd;   // left column: top → bottom
  logoAnim.rightY += logoSpd;   // right column: bottom → top
}


// ════════════════ GHOST AI ═════════════════════════════════════════
const GH_SPD = { NORMAL:90, SCARED:55, RETURN:240, LEAVE:65 };
const GH_EXIT   = { x:935, y:1075 };
const GH_RELEASE= { red:1500, pink:5000, blue:10000, yellow:16000 };
const GH_PROBE  = 6;   // wall probe radius (px)

// Ghost house zone in SVG px — only EATEN ghosts may enter
const GH_ZONE = { x1:780, y1:1080, x2:1090, y2:1330 };

function posInGhostHouse(x, y){
  const sx=x/DRAW_SCALE, sy=y/DRAW_SCALE;
  return sx>GH_ZONE.x1 && sx<GH_ZONE.x2 && sy>GH_ZONE.y1 && sy<GH_ZONE.y2;
}

// Walkability check (wall only) — SWEPT: samples the whole span ahead every 3px
// so thin walls (~10px) can never be tunneled through.
function ghostCanStep(x, y, dx, dy){
  const s = GH_PROBE;                 // lateral half-width
  const maxAhead = GH_PROBE * 3;      // look up to 18px ahead
  for(let d=3; d<=maxAhead; d+=3){
    const nx = x + dx*d, ny = y + dy*d;
    if(dx!==0){ if(!isWalkable(nx,ny-s)||!isWalkable(nx,ny)||!isWalkable(nx,ny+s)) return false; }
    else       { if(!isWalkable(nx-s,ny)||!isWalkable(nx,ny)||!isWalkable(nx+s,ny)) return false; }
  }
  return true;
}

// For ACTIVE/FRIGHTENED: also block re-entry into ghost house
function ghostCanStepActive(g, dx, dy){
  if(!ghostCanStep(g.x, g.y, dx, dy)) return false;
  // Block if next position enters ghost house zone
  const nx = g.x + dx*GH_PROBE*2;
  const ny = g.y + dy*GH_PROBE*2;
  if(posInGhostHouse(nx, ny)) return false;
  return true;
}

const _DIRS = [{dx:0,dy:-1},{dx:1,dy:0},{dx:0,dy:1},{dx:-1,dy:0}];

function ghostPickDir(g, dirs, tx, ty){
  // Frightened: maximize distance from player
  if(g.state==='FRIGHTENED'){
    let best=dirs[0], bestD=-Infinity;
    for(const d of dirs){
      const dd = Math.hypot(g.x+d.dx*40-player.x, g.y+d.dy*40-player.y);
      if(dd>bestD){bestD=dd; best=d;}
    }
    return best;
  }
  // Random chance for medium difficulty
  if(g.key==='blue'   && Math.random()<0.18) return dirs[Math.floor(Math.random()*dirs.length)];
  if(g.key==='yellow' && Math.random()<0.13) return dirs[Math.floor(Math.random()*dirs.length)];

  // Pick direction minimizing Euclidean distance to target (project 40px ahead)
  let best=dirs[0], bestD=Infinity;
  for(const d of dirs){
    const dd = Math.hypot(g.x+d.dx*40-tx, g.y+d.dy*40-ty);
    if(dd<bestD){bestD=dd; best=d;}
  }
  return best;
}

function stepGhost(g, dt, now){
  if(!g.state){g.state='IN_HOUSE'; g.dx=0; g.dy=-1; g._moved=0;}
  if(g.state==='ACTIVE'     && frightTimer>0) g.state='FRIGHTENED';
  if(g.state==='FRIGHTENED' && frightTimer<=0) g.state='ACTIVE';

  // ── IN HOUSE ──────────────────────────────────────────────────────
  if(g.state==='IN_HOUSE'){
    g.y = CHARS[g.key].cy*DRAW_SCALE + Math.sin(now*0.003)*5;
    if(now >= g.releaseAt) g.state='LEAVING';
    return;
  }
  // ── LEAVING ───────────────────────────────────────────────────────
  if(g.state==='LEAVING'){
    const ex=GH_EXIT.x*DRAW_SCALE, ey=GH_EXIT.y*DRAW_SCALE;
    const step=GH_SPD.LEAVE*dt, ddx=ex-g.x, ddy=ey-g.y, dist=Math.hypot(ddx,ddy);
    if(dist<step+3){g.x=ex; g.y=ey; g.state='ACTIVE'; g.dx=0; g.dy=-1; g._moved=0;}
    else{g.x+=ddx/dist*step; g.y+=ddy/dist*step;}
    return;
  }
  // ── EATEN ─────────────────────────────────────────────────────────
  if(g.state==='EATEN'){
    const tx=CHARS[g.key].cx*DRAW_SCALE, ty=CHARS[g.key].cy*DRAW_SCALE;
    const step=GH_SPD.RETURN*dt, ddx=tx-g.x, ddy=ty-g.y, dist=Math.hypot(ddx,ddy);
    if(dist<step+3){g.x=tx; g.y=ty; g.state='IN_HOUSE'; g.dx=0; g.dy=-1; g._moved=0; g.releaseAt=now+3000;}
    else{g.x+=ddx/dist*step; g.y+=ddy/dist*step;}
    return;
  }

  // ── ACTIVE / FRIGHTENED ───────────────────────────────────────────
  const spd = (g.state==='FRIGHTENED' ? GH_SPD.SCARED : GH_SPD.NORMAL) * dt;

  // Target for this ghost
  let tx=player.x, ty=player.y;
  if(g.key==='pink'){ tx=player.x+(player._dx||0)*70; ty=player.y+(player._dy||0)*70; }

  // Use ghostCanStepActive: walls + ghost house blocked for active ghosts
  const stepOk = (dx,dy) => ghostCanStepActive(g, dx, dy);

  // Can continue current direction?
  const canCont = (g.dx||g.dy) && stepOk(g.dx,g.dy);
  g._moved = (g._moved||0) + spd;

  // Is player behind the ghost?
  const behindDot = (tx-g.x)*(-g.dx) + (ty-g.y)*(-g.dy);
  const playerIsBehind = behindDot > 50;

  const shouldDecide = !canCont || g._moved > 16 || playerIsBehind;

  if(shouldDecide){
    g._moved = 0;
    const allDirs = _DIRS.filter(d => stepOk(d.dx,d.dy));
    if(allDirs.length===0) return;

    const noRev = allDirs.filter(d => !(d.dx===-g.dx && d.dy===-g.dy));
    const dirs  = (noRev.length > 0 && !playerIsBehind) ? noRev : allDirs;

    const ch = ghostPickDir(g, dirs, tx, ty);
    g.dx = ch.dx; g.dy = ch.dy;
  }

  if(stepOk(g.dx,g.dy)){g.x+=g.dx*spd; g.y+=g.dy*spd;}
}

function updateGhosts(dt,now){ for(const g of ghosts) stepGhost(g,dt,now); }

function initGhosts(baseTime){
  for(const g of ghosts){
    g.x=CHARS[g.key].cx*DRAW_SCALE; g.y=CHARS[g.key].cy*DRAW_SCALE;
    g.dx=0; g.dy=-1; g.state='IN_HOUSE'; g._moved=0;
    g.releaseAt=(baseTime||0)+GH_RELEASE[g.key];
  }
}

function checkGhostHits(now){
  for(const g of ghosts){
    if(g.state==='IN_HOUSE'||g.state==='LEAVING'||g.state==='EATEN') continue;
    if(Math.hypot(g.x-player.x,g.y-player.y) < CHARS[g.key].w*DRAW_SCALE*0.48+player.half*0.6){
      if(g.state==='FRIGHTENED'){
        g.state='EATEN'; score+=200;
      } else {
        lives--;
        player.x=CHARS.punk.cx*DRAW_SCALE; player.y=CHARS.punk.cy*DRAW_SCALE;
        player.dx=0; player.dy=0; player.ndx=0; player.ndy=0;
        initGhosts(performance.now());  // re-stagger release from respawn moment
        if(lives<=0){ saveScore(playerName||'AAA', score); gstate='GAME_OVER'; gameOverTimer=performance.now()+4500; }
        break;
      }
    }
  }
}

// ── Render ───────────────────────────────────────────────────
// ── Danger barrels + deadly green liquid ─────────────────────
// Two barrels sit still; 20s after the game starts they play an
// "about to explode" animation (~3.5s), then vanish and leave a
// deadly green puddle. Stepping on the green liquid costs a life.
const DANGER_ARM_MS  = 20000;
const DANGER_BOOM_MS = 3500;
const dangers = [
  { obj:'dangerObj2', liq:'dangerLiq2', vbCX:535.5,  vbCY:502.0  }, // top-left
  { obj:'dangerObj1', liq:'dangerLiq1', vbCX:1211.5, vbCY:1772.9 }, // bottom-right
];
let greenMask=null, GMW=0, GMH=0;   // fixed-res deadly-liquid bitmap (resize-independent)

function dangerPhase(){
  if(gstate==='INTRO') return null;
  if(!firstMoveTime) return {name:'BARREL'};          // placed, waiting for first move
  const e=performance.now()-firstMoveTime;
  if(e < DANGER_ARM_MS)                return {name:'BARREL'};
  if(e < DANGER_ARM_MS+DANGER_BOOM_MS) return {name:'BOOM', t:(e-DANGER_ARM_MS)/DANGER_BOOM_MS};
  return {name:'LIQUID'};
}

function buildGreenMask(){
  try{
    const S=0.4, w=Math.round(SVG_W*S), h=Math.round(SVG_H*S);
    const c=document.createElement('canvas'); c.width=w; c.height=h;
    const x=c.getContext('2d');
    for(const d of dangers){
      const img=imgs[d.liq];
      if(!img||!img.complete||img.naturalWidth===0) return false;
      x.drawImage(img,0,0,w,h);
    }
    const data=x.getImageData(0,0,w,h).data, m=new Uint8Array(w*h);
    for(let i=0;i<w*h;i++){
      const a=i*4, r=data[a], g=data[a+1], b=data[a+2], al=data[a+3];
      m[i]=(al>40 && g>120 && g>r+40 && g>b+50)?1:0;   // strong green only
    }
    greenMask=m; GMW=w; GMH=h; return true;
  }catch(e){ return false; }
}

function isOnDanger(x,y){
  if(!greenMask) return false;
  const fx=Math.round(x/DRAW_SCALE*(GMW/SVG_W));
  const fy=Math.round(y/DRAW_SCALE*(GMH/SVG_H));
  if(fx<0||fy<0||fx>=GMW||fy>=GMH) return false;
  return greenMask[fy*GMW+fx]===1;
}

function updateDangers(){
  if(gstate!=='PLAYING') return;
  const ph=dangerPhase();
  if(!ph||ph.name!=='LIQUID') return;
  if(!greenMask){ if(!buildGreenMask()) return; }
  const h=player.half;
  const probes=[[0,0],[h*0.5,0],[-h*0.5,0],[0,h*0.5],[0,-h*0.5]];
  for(const p of probes){
    if(isOnDanger(player.x+p[0], player.y+p[1])){
      lives--;
      player.x=CHARS.punk.cx*DRAW_SCALE; player.y=CHARS.punk.cy*DRAW_SCALE;
      player.dx=0; player.dy=0; player.ndx=0; player.ndy=0;
      initGhosts(performance.now());
      if(lives<=0){ saveScore(playerName||'AAA', score); gstate='GAME_OVER'; gameOverTimer=performance.now()+4500; }
      return;
    }
  }
}

function drawDangers(){
  const ph=dangerPhase();
  if(!ph) return;
  if(ph.name==='LIQUID'){
    for(const d of dangers){
      const img=imgs[d.liq];
      if(img&&img.complete&&img.naturalWidth>0) ctx.drawImage(img,0,0,CSS_W,CSS_H);
    }
    return;
  }
  const now=performance.now();
  for(const d of dangers){
    const img=imgs[d.obj];
    if(!img||!img.complete||img.naturalWidth===0) continue;
    const sx=d.vbCX*VB_SCALE*DRAW_SCALE, sy=d.vbCY*VB_SCALE*DRAW_SCALE;
    ctx.save();
    if(ph.name==='BOOM'){
      const t=ph.t;
      const amp=(1.5+t*9)*DRAW_SCALE;
      const jx=(Math.random()*2-1)*amp, jy=(Math.random()*2-1)*amp;
      const sc=1 + t*0.12 + Math.sin(now*0.03)*0.05;
      const blink=0.55 + 0.45*Math.abs(Math.sin(now*0.008*(1+t*6)));
      ctx.translate(jx,jy);
      ctx.translate(sx,sy); ctx.scale(sc,sc); ctx.translate(-sx,-sy);
      ctx.globalAlpha=blink;
    }
    ctx.drawImage(img,0,0,CSS_W,CSS_H);
    ctx.restore();
  }
}

function drawJoy(){
  if(!joy.active) return;
  ctx.save();
  ctx.globalAlpha=0.28; ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(joy.baseX,joy.baseY,joy.R,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=0.55; ctx.strokeStyle='#fff'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(joy.baseX,joy.baseY,joy.R,0,Math.PI*2); ctx.stroke();
  ctx.globalAlpha=0.85; ctx.fillStyle='#94dbda';
  ctx.beginPath(); ctx.arc(joy.knobX,joy.knobY,joy.KR,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawHUD(){
  // Top bar
  const h=Math.round(CSS_H*0.042);
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,0,CSS_W,h);
  ctx.fillStyle='#94dbda';
  ctx.font=`bold ${Math.round(h*0.33)}px 'Press Start 2P', monospace`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('SCORE  '+score, CSS_W/2, h/2);
  ctx.fillStyle='#ffffff99';
  ctx.font=`${Math.round(h*0.25)}px 'Press Start 2P', monospace`;
  ctx.textAlign='right';
  ctx.fillText('ETH: '+ethCollected, CSS_W-8, h/2);
  if(frightTimer>0){
    ctx.fillStyle='#f283e1';
    ctx.fillRect((CSS_W-CSS_W*0.5)/2, h-3, CSS_W*0.5*(frightTimer/FRIGHT_MS), 3);
  }
  // ── Bottom bar: 5 lives + brain + ethpoint icons ──────────────────
  const chars3 = charOrder;
  const barY       = CSS_H * 0.924;
  const iconSz     = Math.round(CSS_H * 0.038);
  const itemSz     = Math.round(CSS_H * 0.022);
  const lifeSpacing = CSS_W * 0.085;
  const lifeStartX  = CSS_W * 0.16;             // lives: left side
  const itemSpacing = CSS_W * 0.055;            // items: closer together
  const itemStartX  = CSS_W * 0.72;             // items: right side

  for(let i=0;i<5;i++){
    const key=chars3[i], img=imgs[key];
    if(!img||!img.complete||img.naturalWidth===0) continue;
    const c=CHARS[key], sc=iconSz/c.w;
    const ix=lifeStartX+i*lifeSpacing;
    const bounce=Math.sin(performance.now()*0.004+i*2.1)*3;
    const alive=(5-i)<=lives;
    ctx.save(); ctx.globalAlpha=alive?1:0.22;
    ctx.beginPath(); ctx.rect(ix-iconSz/2-1,barY-iconSz*0.8,iconSz+2,iconSz*1.6); ctx.clip();
    ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';
    ctx.drawImage(img,ix-c.cx*sc,barY+bounce-c.cy*sc,SVG_W*sc,SVG_H*sc);
    ctx.restore();
  }
  // Brain icon
  if(imgs.brain&&imgs.brain.complete){
    const bsc=itemSz/ITEM_INFO.brain.w;
    const bix=itemStartX;
    const bbounce=Math.sin(performance.now()*0.004+0.5)*3;
    ctx.save(); ctx.beginPath(); ctx.rect(bix-itemSz/2-1,barY-itemSz*0.8+bbounce,itemSz+2,itemSz*1.6); ctx.clip();
    ctx.drawImage(imgs.brain,bix-ITEM_INFO.brain.cx*bsc,(barY+bbounce)-ITEM_INFO.brain.cy*bsc,SVG_W*bsc,SVG_H*bsc);
    ctx.restore();
  }
  // ETH point icon
  if(imgs.point&&imgs.point.complete){
    const psc=itemSz/ITEM_INFO.point.w;
    const pix=itemStartX+itemSpacing;
    const pbounce=Math.sin(performance.now()*0.004+2.0)*3;
    ctx.save(); ctx.beginPath(); ctx.rect(pix-itemSz/2-1,barY-itemSz*0.8+pbounce,itemSz+2,itemSz*1.6); ctx.clip();
    ctx.drawImage(imgs.point,pix-ITEM_INFO.point.cx*psc,(barY+pbounce)-ITEM_INFO.point.cy*psc,SVG_W*psc,SVG_H*psc);
    ctx.restore();
  }
}

function render(ts){
  ctx.drawImage(imgs.base, 0, 0, CSS_W, CSS_H);
  // 6529 Logo — fills left (top→bottom) and right (bottom→top) gray columns
  if(imgs.logo6529 && imgs.logo6529.complete && imgs.logo6529.naturalWidth>0){
    // Source rect: the logo portion in the 1880×2470 SVG natural image
    const sx=Math.round(LOGO6529.cx-LOGO6529.w/2), sy=Math.round(LOGO6529.cy-LOGO6529.h/2);
    const sw=LOGO6529.w, sh=LOGO6529.h;

    // Display size: fit logo in column width
    const logoDispW = Math.round(CSS_W*0.048);            // logo width on screen
    const logoDispH = Math.round(logoDispW*sh/sw);        // keep aspect ratio
    const spacing   = Math.round(logoDispH*1.15);         // gap between logos

    // Left column center (SVG x 0→170, center=85 → CSS_W*0.0452)
    const colLX = CSS_W*0.046 - logoDispW/2;
    // Right column center (SVG x 1814→1880, center=1847 → CSS_W*0.9824)
    const colRX = CSS_W*0.958 - logoDispW/2;

    // How many logos to fill the screen (+2 for seamless wrap)
    const count = Math.ceil(CSS_H/spacing)+2;

    ctx.save(); ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';

    // LEFT column: top → bottom
    const offsetL = logoAnim.leftY % spacing;
    for(let i=-1;i<count;i++){
      const y = offsetL + i*spacing;
      ctx.drawImage(imgs.logo6529, sx,sy,sw,sh, colLX, y, logoDispW, logoDispH);
    }
    // RIGHT column: bottom → top
    const offsetR = logoAnim.rightY % spacing;
    for(let i=-1;i<count;i++){

  // SgtMan — appears when Brain collected, flies right→left

// Pixel-art text: render small font scaled up with no smoothing
function drawPixelBig(text, cx, cy, color){
  const tmp=document.createElement('canvas');
  const charW=7, charH=9, gap=1;
  tmp.width=text.length*(charW+gap)+2;
  tmp.height=charH+2;
  const t=tmp.getContext('2d');
  t.font=`${charH}px "Courier New", monospace`;
  t.fillStyle=color;
  t.textBaseline='top';
  t.fillText(text, 1, 1);
  const scale=Math.round(CSS_W/60);  // scale so text fills ~60 chars width
  ctx.save();
  ctx.imageSmoothingEnabled=false;
  ctx.shadowColor=color;
  ctx.shadowBlur=8;
  ctx.drawImage(tmp,
    Math.round(cx - tmp.width*scale/2),
    Math.round(cy - tmp.height*scale/2),
    tmp.width*scale, tmp.height*scale);
  ctx.restore();
}

// ── Loop ─────────────────────────────────────────────────────
let gameStarted=false, lastTs=0;
let activeGame='mememan'; // 'mememan' | 'snake' — set by game-select overlay
function loop(ts){
  const dt=(ts-lastTs)/1000; lastTs=ts;
  if(activeGame==='snake'){ updateSnake(dt); renderSnake(ts); }
  else { update(dt); render(ts); }
  requestAnimationFrame(loop);
}

// ── Character selection (hybrid: chosen first, then morph) ───
let selectedChar='punk';
let charOrder=['punk','pepe','summer','satoshi','sgt'];
function setCharOrder(c){
  const base=['punk','pepe','summer','satoshi','sgt'];
  const i=Math.max(0, base.indexOf(c));
  charOrder = base.slice(i).concat(base.slice(0,i));
}
function drawPickIcon(cv){
  const key=cv.dataset.char, c=CHARS[key], img=imgs[key];
  if(!c||!img||!img.complete||img.naturalWidth===0) return;
  const pad=10*VB_SCALE;
  const sx=(c.vbCX-c.vbW/2)*VB_SCALE-pad, sy=(c.vbCY-c.vbH/2)*VB_SCALE-pad;
  const sw=c.vbW*VB_SCALE+pad*2, sh=c.vbH*VB_SCALE+pad*2;
  const x=cv.getContext('2d'); x.clearRect(0,0,cv.width,cv.height);
  const sc=Math.min(cv.width/sw, cv.height/sh), dw=sw*sc, dh=sh*sc;
  x.imageSmoothingEnabled=true; x.imageSmoothingQuality='high';
  x.drawImage(img, sx,sy,sw,sh, (cv.width-dw)/2,(cv.height-dh)/2, dw,dh);
}
function initCharPicker(){
  const cvs=document.querySelectorAll('.cpick');
  cvs.forEach(cv=>{
    drawPickIcon(cv);
    cv.addEventListener('click', ()=>{
      selectedChar=cv.dataset.char;
      cvs.forEach(o=>o.classList.toggle('sel', o===cv));
    });
  });
  const def=document.querySelector('.cpick[data-char="'+selectedChar+'"]');
  if(def) def.classList.add('sel');
}

// ── Chiptune music (procedural Web Audio) + on/off ───────────
let actx=null, mGain=null, sfxGain=null, musicOn=true, musicStarted=false, mStep=0, mNext=0;
const M_LEAD=[523.25,622.25,392.00,466.16,523.25,466.16,392.00,311.13,349.23,392.00,466.16,523.25,466.16,392.00,311.13,261.63];
const M_BASS=[65.41,103.83,116.54,98.00];
const M_STEP=0.2;
function mNote(freq,t,dur,type,vol){
  if(!freq||!actx) return;
  const o=actx.createOscillator(), g=actx.createGain();
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(vol,t+0.015);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g); g.connect(mGain); o.start(t); o.stop(t+dur+0.03);
}
function mSchedule(){
  if(!actx) return;
  while(mNext < actx.currentTime+0.15){
    mNote(M_LEAD[mStep%16], mNext, M_STEP*0.85, 'square', 0.22);
    if(mStep%4===0) mNote(M_BASS[(mStep/4|0)%4], mNext, M_STEP*3.6, 'triangle', 0.30);
    mNext+=M_STEP; mStep++;
  }
  setTimeout(mSchedule,50);
}
function sfxBrain(){
  if(!actx||!sfxGain) return;
  const t=actx.currentTime, notes=[392.00,523.25,659.25,784.00];
  notes.forEach((f,i)=>{
    const o=actx.createOscillator(), g=actx.createGain(); o.type='square'; o.frequency.value=f;
    const st=t+i*0.06;
    g.gain.setValueAtTime(0.0001,st);
    g.gain.exponentialRampToValueAtTime(0.26,st+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,st+0.14);
    o.connect(g); g.connect(sfxGain); o.start(st); o.stop(st+0.16);
  });
}
function sfxEth(){
  if(!actx||!sfxGain) return;
  const t=actx.currentTime;
  const o=actx.createOscillator(), g=actx.createGain();
  o.type='square';
  o.frequency.setValueAtTime(880,t);
  o.frequency.exponentialRampToValueAtTime(1760,t+0.07);
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(0.3,t+0.008);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.13);
  o.connect(g); g.connect(sfxGain); o.start(t); o.stop(t+0.15);
}
function startMusic(){
  if(musicStarted) return;
  try{
    actx=new (window.AudioContext||window.webkitAudioContext)();
    mGain=actx.createGain(); mGain.gain.value=musicOn?0.35:0; mGain.connect(actx.destination);
    sfxGain=actx.createGain(); sfxGain.gain.value=musicOn?1:0; sfxGain.connect(actx.destination);
    mNext=actx.currentTime+0.12; musicStarted=true; mSchedule();
  }catch(e){}
}
function toggleMusic(){
  musicOn=!musicOn;
  if(musicOn && !musicStarted) startMusic();
  if(actx && actx.state==='suspended') actx.resume();
  if(mGain) mGain.gain.value = musicOn?0.35:0;
  if(sfxGain) sfxGain.gain.value = musicOn?1:0;
  const b=document.getElementById('snd-btn'); if(b) b.textContent = musicOn?'🔊':'🔇';
}
(function(){ const b=document.getElementById('snd-btn'); if(b) b.addEventListener('click', e=>{ e.stopPropagation(); toggleMusic(); }); })();

// ══════════════════════════════════════════════════════════════════
// MEME-SNAKE (Snake minigame) — fully separate from Meme-Man above.
// Shares: canvas/ctx, CSS_W/CSS_H/DRAW_SCALE/VB_SCALE, keys/joy input,
// startMusic/sfxEth, drawPixelBig, getLeaderboard/saveScore.
// ══════════════════════════════════════════════════════════════════
const SNK_LB_KEY = 'punkman_lb_snake';

// Grid geometry, in the same 1744×2292 design coordinate space as
// everything else. Playable area measured from layer2nd-game.svg.
const SNK_COLS = 20, SNK_ROWS = 32;
const SNK_X0 = 287.3, SNK_Y0 = 175.9;
const SNK_BW = 1178.7, SNK_BH = 1893.5;
const SNK_CW = SNK_BW / SNK_COLS;
const SNK_CH = SNK_BH / SNK_ROWS;

// Source crop boxes (viewBox units) for head/body/food art within
// their own 1744×2292 canvases — same convention as CHARS elsewhere.
const SNK_HEAD_BOX = {
  punk:    {x0:296, y0:227, x1:361, y1:301},
  pepe:    {x0:542, y0:231, x1:608, y1:298},
  satoshi: {x0:376, y0:226, x1:451, y1:300},
  sgt:     {x0:457, y0:226, x1:534, y1:302},
  summer:  {x0:622, y0:242, x1:699, y1:295},
};
const SNK_BODY_BOX = {
  punk:    {x0:310, y0:199, x1:347, y1:227},
  pepe:    {x0:555, y0:204, x1:593, y1:232},
  satoshi: {x0:394, y0:199, x1:432, y1:228},
  sgt:     {x0:478, y0:198, x1:516, y1:227},
  summer:  {x0:637, y0:214, x1:675, y1:243},
};
const SNK_FOOD_BOX = {x0:639, y0:306, x1:680, y1:355};

let snkChar = 'punk';
let snkSelectedChar = 'punk';
let snkState = 'INTRO';   // INTRO | WAITING | PLAYING | GAME_OVER
let snkSnake = [];        // [{c,r}, ...] head first
let snkDir = {c:1, r:0};
let snkPendingDir = {c:1, r:0};
let snkFood = {c:0, r:0};
let snkScore = 0;
let snkFoodEaten = 0;
let snkTickMs = 150;
let snkAcc = 0;
let snkPlayerName = '';
let snkGameOverTimer = 0;

function snkReset(){
  const c0 = Math.floor(SNK_COLS/2), r0 = Math.floor(SNK_ROWS/2);
  snkSnake = [{c:c0,r:r0},{c:c0-1,r:r0},{c:c0-2,r:r0}];
  snkDir = {c:1,r:0}; snkPendingDir = {c:1,r:0};
  snkScore = 0; snkFoodEaten = 0; snkTickMs = 150; snkAcc = 0;
  snkPlaceFood();
}

function snkPlaceFood(){
  let c, r, collide;
  do{
    c = Math.floor(Math.random()*SNK_COLS);
    r = Math.floor(Math.random()*SNK_ROWS);
    collide = snkSnake.some(s=>s.c===c && s.r===r);
  }while(collide);
  snkFood = {c, r};
}

function snkGameOver(){
  snkState = 'GAME_OVER';
  saveScore(snkPlayerName||'AAA', snkScore, {lbKey:SNK_LB_KEY, eth:snkFoodEaten});
  snkGameOverTimer = performance.now()+4500;
}

function updateSnake(dt){
  if(snkState==='GAME_OVER'){
    if(performance.now() >= snkGameOverTimer){
      snkReset();
      snkState = 'INTRO';
      snkPlayerName = '';
      const ov = document.getElementById('snake-intro-overlay');
      if(ov) ov.style.display='flex';
      const jb2=document.getElementById('joy-select-btn'); if(jb2) jb2.style.display='flex';
    }
    return;
  }
  // Logo scroll — same shared animation state as Meme-Man
  const logoSpd = CSS_H * 0.10 * dt;
  logoAnim.leftY  += logoSpd;
  logoAnim.rightY += logoSpd;

  if(snkState==='INTRO') return; // HTML overlay handles the rest

  // read input (reuse the same globals Meme-Man's own update() reads)
  let dx=0, dy=0;
  if(keys.ArrowLeft ||keys.KeyA) dx=-1;
  if(keys.ArrowRight||keys.KeyD) dx= 1;
  if(keys.ArrowUp   ||keys.KeyW) dy=-1;
  if(keys.ArrowDown ||keys.KeyS) dy= 1;
  if(dx&&dy) dy=0;
  if(joy.active && (joy.dirX||joy.dirY)){
    if(Math.abs(joy.dirX)>=Math.abs(joy.dirY)){ dx=joy.dirX>0?1:-1; dy=0; }
    else { dx=0; dy=joy.dirY>0?1:-1; }
  }
  if(dx||dy){
    if(!(dx===-snkDir.c && dy===-snkDir.r)) snkPendingDir={c:dx,r:dy};
    if(snkState==='WAITING') snkState='PLAYING';
  }
  if(snkState!=='PLAYING') return;

  snkAcc += dt*1000;
  if(snkAcc < snkTickMs) return;
  snkAcc -= snkTickMs;

  snkDir = snkPendingDir;
  const head = snkSnake[0];
  const nc = head.c + snkDir.c, nr = head.r + snkDir.r;

  if(nc<0 || nc>=SNK_COLS || nr<0 || nr>=SNK_ROWS){ snkGameOver(); return; }
  const willEat = (nc===snkFood.c && nr===snkFood.r);
  // exclude the tail cell from the check when it's about to move away
  // (classic Snake rule: moving into your own vacating tail is legal)
  const bodyToCheck = willEat ? snkSnake : snkSnake.slice(0, -1);
  if(bodyToCheck.some(s=>s.c===nc && s.r===nr)){ snkGameOver(); return; }

  snkSnake.unshift({c:nc, r:nr});
  if(willEat){
    snkScore += 10; snkFoodEaten++;
    sfxEth();
    snkPlaceFood();
    snkTickMs = Math.max(70, snkTickMs-2);
  } else {
    snkSnake.pop();
  }
}

function snkDrawSprite(key, box, dx, dy, dw, dh, pad=0){
  const img = imgs[key];
  if(!img || !img.complete || !img.naturalWidth) return;
  const sx=box.x0*VB_SCALE, sy=box.y0*VB_SCALE;
  const sw=(box.x1-box.x0)*VB_SCALE, sh=(box.y1-box.y0)*VB_SCALE;
  ctx.drawImage(img, sx,sy,sw,sh, dx+pad, dy+pad, dw-pad*2, dh-pad*2);
}

function renderSnake(ts){
  ctx.drawImage(imgs.snakeBoard, 0, 0, CSS_W, CSS_H);

  // 6529 logo side columns (same asset/animation as Meme-Man's render())
  if(imgs.logo6529 && imgs.logo6529.complete && imgs.logo6529.naturalWidth>0){
    const sx=Math.round(LOGO6529.cx-LOGO6529.w/2), sy=Math.round(LOGO6529.cy-LOGO6529.h/2);
    const sw=LOGO6529.w, sh=LOGO6529.h;
    const logoDispW = Math.round(CSS_W*0.048);
    const logoDispH = Math.round(logoDispW*sh/sw);
    const spacing   = Math.round(logoDispH*1.15);
    const colLX = CSS_W*0.046 - logoDispW/2;
    const colRX = CSS_W*0.958 - logoDispW/2;
    const count = Math.ceil(CSS_H/spacing)+2;
    ctx.save(); ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';
    const offsetL = logoAnim.leftY % spacing;
    for(let i=-1;i<count;i++){
      const y = offsetL + i*spacing;
      ctx.drawImage(imgs.logo6529, sx,sy,sw,sh, colLX, y, logoDispW, logoDispH);
    }
    const offsetR = logoAnim.rightY % spacing;
    for(let i=-1;i<count;i++){
      const y = CSS_H - offsetR - i*spacing - logoDispH;
      ctx.drawImage(imgs.logo6529, sx,sy,sw,sh, colRX, y, logoDispW, logoDispH);
    }
    ctx.restore();
  }

  const ox = SNK_X0*VB_SCALE*DRAW_SCALE, oy = SNK_Y0*VB_SCALE*DRAW_SCALE;
  const cw = SNK_CW*VB_SCALE*DRAW_SCALE, ch = SNK_CH*VB_SCALE*DRAW_SCALE;

  snkDrawSprite('snakeFood', SNK_FOOD_BOX, ox+snkFood.c*cw, oy+snkFood.r*ch, cw, ch, Math.min(cw,ch)*0.12);

  for(let i=snkSnake.length-1;i>=1;i--){
    const s=snkSnake[i];
    snkDrawSprite('snakeBody_'+snkChar, SNK_BODY_BOX[snkChar], ox+s.c*cw, oy+s.r*ch, cw, ch);
  }
  if(snkSnake.length){
    const h=snkSnake[0];
    snkDrawSprite('snakeHead_'+snkChar, SNK_HEAD_BOX[snkChar], ox+h.c*cw, oy+h.r*ch, cw, ch);
  }

  snkDrawHUD();

  // ── INTRO SCREEN ──────────────────────────────────────────────────
  if(snkState==='INTRO'){
    ctx.fillStyle='rgba(0,0,0,0.88)';
    ctx.fillRect(0,0,CSS_W,CSS_H);
    if(imgs.layerIntroEnd && imgs.layerIntroEnd.complete && imgs.layerIntroEnd.naturalWidth>0)
      ctx.drawImage(imgs.layerIntroEnd,0,0,CSS_W,CSS_H);

    if(imgs.snakeTitle && imgs.snakeTitle.complete && imgs.snakeTitle.naturalWidth>0){
      ctx.save();
      const stY = CSS_H * 0.30, stS = 0.52;
      ctx.translate(CSS_W/2, stY);
      ctx.scale(stS, stS);
      ctx.drawImage(imgs.snakeTitle, -937.9*DRAW_SCALE, -894.1*DRAW_SCALE, SVG_W*DRAW_SCALE, SVG_H*DRAW_SCALE);
      ctx.restore();
    }

    const lb = getLeaderboard(SNK_LB_KEY);
    ctx.fillStyle='#FFD700';
    ctx.font=`bold ${Math.round(CSS_H*0.012)}px 'Press Start 2P', monospace`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('TOP SEIZE', CSS_W/2, CSS_H*0.41);
    ctx.font=`${Math.round(CSS_H*0.0105)}px 'Press Start 2P', monospace`;
    lb.slice(0,5).forEach((e,i)=>{
      const y=CSS_H*0.41+CSS_H*0.025*(i+1), startX=CSS_W/2-CSS_W*0.19;
      ctx.textAlign='left';
      const namePart=`${i+1}. ${(e.name||'').padEnd(7,' ')} ${e.score} / `;
      ctx.fillStyle=i===0?'#FFD700':'#ffffff';
      ctx.fillText(namePart, startX, y);
      const w=ctx.measureText(namePart).width;
      ctx.fillStyle='#94dbda';
      ctx.fillText(`${e.eth||0} FOOD`, startX+w, y);
    });
    if(!lb.length){
      ctx.textAlign='center';
      ctx.fillStyle='#888'; ctx.fillText('no scores yet', CSS_W/2, CSS_H*0.45);
    }
    return;
  }

  // WAITING state hint
  if(snkState==='WAITING'){
    ctx.save();
    ctx.globalAlpha = 0.8+(Math.sin(ts*0.004)*0.2);
    ctx.fillStyle='#FFD700';
    ctx.font=`bold ${Math.round(CSS_H*0.015)}px 'Press Start 2P', monospace`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('MOVE TO START', CSS_W/2, CSS_H*0.92);
    ctx.restore();
  }

  // GAME OVER overlay
  if(snkState==='GAME_OVER'){
    ctx.fillStyle='rgba(0,0,0,0.88)';
    ctx.fillRect(0,0,CSS_W,CSS_H);
    if(imgs.layerIntroEnd && imgs.layerIntroEnd.complete && imgs.layerIntroEnd.naturalWidth>0)
      ctx.drawImage(imgs.layerIntroEnd,0,0,CSS_W,CSS_H);

    if(imgs.snakeGameOver && imgs.snakeGameOver.complete && imgs.snakeGameOver.naturalWidth>0){
      ctx.save();
      const goY = CSS_H * 0.33, goS = 0.55;
      ctx.translate(CSS_W/2, goY);
      ctx.scale(goS, goS);
      ctx.drawImage(imgs.snakeGameOver, -936.3*DRAW_SCALE, -1171.7*DRAW_SCALE, SVG_W*DRAW_SCALE, SVG_H*DRAW_SCALE);
      ctx.restore();
    }

    const lb2 = getLeaderboard(SNK_LB_KEY);
    ctx.fillStyle='#FFD700';
    ctx.font=`bold ${Math.round(CSS_H*0.0145)}px 'Press Start 2P', monospace`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('TOP SEIZE', CSS_W/2, CSS_H*0.46);
    ctx.font=`${Math.round(CSS_H*0.0125)}px 'Press Start 2P', monospace`;
    lb2.slice(0,5).forEach((e,i)=>{
      const gy=CSS_H*0.46+CSS_H*0.030*(i+1), startX=CSS_W/2-CSS_W*0.19;
      ctx.textAlign='left';
      const namePart=`${i+1}. ${(e.name||'').padEnd(7,' ')} ${e.score} / `;
      ctx.fillStyle=i===0?'#FFD700':'#fff';
      ctx.fillText(namePart, startX, gy);
      const w=ctx.measureText(namePart).width;
      ctx.fillStyle='#94dbda';
      ctx.fillText(`${e.eth||0} FOOD`, startX+w, gy);
    });
    ctx.textAlign='center';
    ctx.fillStyle='#94dbda'; ctx.font=`${Math.round(CSS_H*0.012)}px 'Press Start 2P', monospace`;
    ctx.fillText('restarting...', CSS_W/2, CSS_H*0.82);
  }
}

// ── HUD: top score bar + bottom hero row (mirrors Meme-Man's drawHUD) ──
function snkDrawHUD(){
  const h=Math.round(CSS_H*0.042);
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,0,CSS_W,h);
  ctx.fillStyle='#94dbda';
  ctx.font=`bold ${Math.round(h*0.33)}px 'Press Start 2P', monospace`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('SCORE  '+snkScore, CSS_W/2, h/2);
  ctx.fillStyle='#ffffff99';
  ctx.font=`${Math.round(h*0.25)}px 'Press Start 2P', monospace`;
  ctx.textAlign='right';
  ctx.fillText('FOOD: '+snkFoodEaten, CSS_W-8, h/2);

  // Bottom bar: all 5 heroes, currently selected one highlighted
  const heroes=['punk','pepe','summer','satoshi','sgt'];
  const barY = CSS_H*0.924;
  const iconSz = Math.round(CSS_H*0.038);
  const spacing = CSS_W*0.085;
  const startX = CSS_W*0.5 - spacing*2;
  heroes.forEach((key,i)=>{
    const img = imgs['snakeHead_'+key];
    const box = SNK_HEAD_BOX[key];
    if(!img||!img.complete||!img.naturalWidth) return;
    const active = key===snkChar;
    const ix = startX + i*spacing;
    const bounce = active ? Math.sin(performance.now()*0.004+i*2.1)*3 : 0;
    const sx=box.x0*VB_SCALE, sy=box.y0*VB_SCALE;
    const sw=(box.x1-box.x0)*VB_SCALE, sh=(box.y1-box.y0)*VB_SCALE;
    const scale = iconSz/Math.max(sw,sh);
    const dw=sw*scale, dh=sh*scale;
    ctx.save();
    ctx.globalAlpha = active?1:0.35;
    ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';
    ctx.drawImage(img, sx,sy,sw,sh, ix-dw/2, barY+bounce-dh/2, dw, dh);
    ctx.restore();
  });
}

// ── Snake hero picker (mirrors initCharPicker for the main game) ──
function drawSnakePickIcon(cv){
  const key = cv.dataset.char;
  const box = SNK_HEAD_BOX[key];
  const img = imgs['snakeHead_'+key];
  if(!img || !img.complete || img.naturalWidth===0) return;
  const x = cv.getContext('2d');
  x.clearRect(0,0,cv.width,cv.height);
  x.imageSmoothingEnabled=true; x.imageSmoothingQuality='high';
  const sx=box.x0*VB_SCALE, sy=box.y0*VB_SCALE;
  const sw=(box.x1-box.x0)*VB_SCALE, sh=(box.y1-box.y0)*VB_SCALE;
  const pad=6;
  x.drawImage(img, sx,sy,sw,sh, pad,pad, cv.width-pad*2, cv.height-pad*2);
}
function initSnakeCharPicker(){
  const cvs=document.querySelectorAll('.cpick-snake');
  cvs.forEach(cv=>{
    drawSnakePickIcon(cv);
    cv.addEventListener('click', ()=>{
      snkSelectedChar=cv.dataset.char;
      cvs.forEach(o=>o.classList.toggle('sel', o===cv));
    });
  });
  const def=document.querySelector('.cpick-snake[data-char="'+snkSelectedChar+'"]');
  if(def) def.classList.add('sel');
}
