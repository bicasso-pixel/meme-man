}

  // Disappear when fully off left edge
  if(sgt.x < -W) sgt.phase = 'HIDDEN';
}

function resize(){
  DRAW_SCALE = Math.min(window.innerWidth/SVG_W, window.innerHeight/SVG_H);
  CSS_W = Math.round(SVG_W*DRAW_SCALE);

// ── Draw any SVG asset (character or item) ────────────────────
// All assets share the same 1880×2470 coordinate space.
// We translate to (screenX, screenY) and draw the full SVG
// offset so its center (cx,cy in SVG px) aligns there.
function drawSVG(key, cx, cy, screenX, screenY, flipH, pulse, pulseAmt){
  const dw = SVG_W * DRAW_SCALE;
  const dh = SVG_H * DRAW_SCALE;
  let sc = 1;
  if(pulse) sc = 1 + Math.sin(Date.now()*0.004)*(pulseAmt||0.14);
  ctx.save();
  ctx.translate(screenX, screenY);
  if(flipH) ctx.scale(-1,1);
  if(pulse) ctx.scale(sc,sc);
  ctx.drawImage(imgs[key], -cx*DRAW_SCALE, -cy*DRAW_SCALE, dw, dh);
  ctx.restore();
}

// Shortcuts
function drawChar(key, sx, sy, flipH){
  const c=CHARS[key];
  drawSVG(key, c.cx, c.cy, sx, sy, flipH, false);
}
function drawItem(key, sx, sy, pulse, pulseAmt){

  drawSVG(key, it.cx, it.cy, sx, sy, false, pulse, pulseAmt);
}

// ── Collision mask ───────────────────────────────────────────
let maskPixels=null, maskW=0, maskH=0, maskReady=false;

function rebuildMask(){
  // Build at 2× CSS resolution for sharp color boundaries
  const mw=CSS_W*2, mh=CSS_H*2;
  const mc=document.createElement('canvas');
  mc.width=mw; mc.height=mh;
  const mx=mc.getContext('2d');
  mx.imageSmoothingEnabled=false;       // no anti-aliasing → clean colors
  mx.drawImage(imgs.base,0,0,mw,mh);
  try{
    maskPixels=mx.getImageData(0,0,mw,mh).data;
    maskW=mw; maskH=mh; maskReady=true;
    console.log('Mask OK',mw+'x'+mh);
  }catch(e){
    console.error('Mask FAILED',e.message);
    maskReady=false;
  }
}

function pixelAt(x,y){
  // coords are CSS pixels; mask is 2× CSS resolution
  const px=Math.round(Math.max(0,Math.min(maskW-1, x*2)));
  const py=Math.round(Math.max(0,Math.min(maskH-1, y*2)));
  const i=(py*maskW+px)*4;
  return [maskPixels[i], maskPixels[i+1], maskPixels[i+2]];
}

// White floor = r>150 and roughly grey (r≈g≈b)
function isWalkable(x,y){
  if(!maskReady) return false;          // fail-safe: no mask = nothing walkable
  const [r,g,b]=pixelAt(x,y);
  return r>230 && g>230 && b>230;       // only pure white floor
}

// Good spot: walkable at center + 4 side probes (item fully inside white)
function isGoodSpot(x,y,m){
  return isWalkable(x,y) && isWalkable(x-m,y) && isWalkable(x+m,y)
                          && isWalkable(x,y-m) && isWalkable(x,y+m);
}

// Sub-step movement — never skips walls
function tryMove(x,y,dx,dy,dist,half){
  const steps=Math.ceil(dist), sx=dx*(dist/steps), sy=dy*(dist/steps);
  let cx=x, cy=y; const s=half*0.70;
  for(let i=0;i<steps;i++){
    const nx=cx+sx, ny=cy+sy; let blocked;
    if(dx!==0){const ex=nx+dx*half; blocked=!isWalkable(ex,ny-s)||!isWalkable(ex,ny)||!isWalkable(ex,ny+s);}
    else       {const ey=ny+dy*half; blocked=!isWalkable(nx-s,ey)||!isWalkable(nx,ey)||!isWalkable(nx+s,ey);}
    if(blocked) break; cx=nx; cy=ny;
  }
  return {x:cx, y:cy};
}

// Find nearest good spot within radius
function nearestGood(tx,ty,m,maxR){
  for(let r=0;r<=maxR;r+=2){
    const steps=Math.max(12,Math.round(r*2.5));
    for(let i=0;i<steps;i++){
      const a=i/steps*Math.PI*2;
      const x=Math.round(tx+Math.cos(a)*r);
      const y=Math.round(ty+Math.sin(a)*r);
      if(x>m&&x<CSS_W-m&&y>m&&y<CSS_H-m&&isGoodSpot(x,y,m)) return{x,y};
    }
  }
  return null;
}

// ── Score & power-up ─────────────────────────────────────────
let score=0, lives=3, frightTimer=0;
let gstate='WAITING';   // WAITING | PLAYING | GAME_OVER | WIN
let winTimer=0;
let firstMoveTime=0;    // timestamp when player first moves
let gameOverTimer=0;    // countdown before auto-restart
const FRIGHT_MS=5500;

// Item hit radius = half the item's visual size in canvas px
function itemRadius(key){
  const it = ITEM_INFO[key];
  return it.w * DRAW_SCALE * 0.55;
}

// ── Player ───────────────────────────────────────────────────
const SPEED_PPS = 180;
const player = {x:0, y:0, half:0, facingLeft:false};
const ghosts  = [
  {key:'red',x:0,y:0}, {key:'pink',x:0,y:0},
  {key:'blue',x:0,y:0},{key:'yellow',x:0,y:0},
];

// ── Input ────────────────────────────────────────────────────
const keys={};
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup',e=>{ keys[e.code]=false; });

const joy={active:false,id:null,baseX:0,baseY:0,knobX:0,knobY:0,dirX:0,dirY:0,R:70,KR:28,DEAD:10};
function touchCSS(t){
  const r=canvas.getBoundingClientRect();
  return{x:(t.clientX-r.left)*(CSS_W/r.width), y:(t.clientY-r.top)*(CSS_H/r.height)};
}
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(joy.active) continue;
    const{x,y}=touchCSS(t);
    if(x<CSS_W*0.65){
      joy.active=true; joy.id=t.identifier;
      joy.baseX=x; joy.baseY=y; joy.knobX=x; joy.knobY=y;
      joy.dirX=0; joy.dirY=0;
    }
  }
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier!==joy.id) continue;
    const{x,y}=touchCSS(t);
    const dx=x-joy.baseX, dy=y-joy.baseY, dist=Math.sqrt(dx*dx+dy*dy);
    const cl=Math.min(dist,joy.R), ang=Math.atan2(dy,dx);
    joy.knobX=joy.baseX+Math.cos(ang)*cl; joy.knobY=joy.baseY+Math.sin(ang)*cl;
    joy.dirX=dist>joy.DEAD?dx/dist:0; joy.dirY=dist>joy.DEAD?dy/dist:0;
  }
},{passive:false});
function joyEnd(e){
  e.preventDefault();
  for(const t of e.changedTouches)
    if(t.identifier===joy.id){joy.active=false;joy.id=null;joy.dirX=0;joy.dirY=0;}
}
canvas.addEventListener('touchend',   joyEnd,{passive:false});
canvas.addEventListener('touchcancel',joyEnd,{passive:false});

// ── Update ───────────────────────────────────────────────────
function update(dt){
  if(gstate==='GAME_OVER'||gstate==='WIN') return;
  const safeDt=Math.min(dt,0.05), move=SPEED_PPS*safeDt;
  frightTimer=Math.max(0,frightTimer-dt*1000);

  let dx=0,dy=0;
  if(keys.ArrowLeft ||keys.KeyA) dx=-1;
  if(keys.ArrowRight||keys.KeyD) dx= 1;
  if(keys.ArrowUp   ||keys.KeyW) dy=-1;
  if(keys.ArrowDown ||keys.KeyS) dy= 1;
  if(dx&&dy) dy=0;
  if(joy.active&&(joy.dirX||joy.dirY)){
    if(Math.abs(joy.dirX)>=Math.abs(joy.dirY)){dx=joy.dirX>0?1:-1;dy=0;}
    else{dx=0;dy=joy.dirY>0?1:-1;}
  }
  if(dx||dy){
    if(dx<0) player.facingLeft=true;
    if(dx>0) player.facingLeft=false;
    player._dx=dx; player._dy=dy;  // for predictor ghost
    if(gstate==='WAITING'){
      gstate='PLAYING';
      firstMoveTime=performance.now();
      initGhosts(firstMoveTime);  // start release timers NOW
    }
    const r=tryMove(player.x,player.y,dx,dy,move,player.half);
    player.x=r.x; player.y=r.y;
  }

  // Pickups
  const pR=itemRadius('point')+player.half*0.5;
  const bR=itemRadius('brain')+player.half*0.5;
  for(const p of points)
    if(!p.eaten && Math.hypot(p.x-player.x,p.y-player.y)<pR){
      p.eaten=true; p.respawnAt=performance.now()+12000; score+=10;
    }
  for(const b of brains)
    if(!b.eaten && Math.hypot(b.x-player.x,b.y-player.y)<bR){
      b.eaten=true; score+=50; frightTimer=FRIGHT_MS; triggerSgtMan();
    }

  // ── ETH points: each respawns individually after 12 seconds ────────
  const nowMs = performance.now();
  for(const p of points){
    if(p.eaten && p.respawnAt && nowMs >= p.respawnAt){
      p.eaten = false;
      p.respawnAt = null;
    }
  }

  // Ghost AI — only when game is PLAYING
  const now=performance.now();
  if(gstate==='PLAYING'){
    updateGhosts(dt, now);
    checkGhostHits(now);
  }
  // SgtMan flies always (decorative, independent of game state)
  updateSgtMan(dt);
}


// ════════════════ GHOST AI ═════════════════════════════════════════
const GH_SPD = { NORMAL:90, SCARED:55, RETURN:240, LEAVE:65 };
const GH_EXIT   = { x:935, y:1075 };
const GH_RELEASE= { red:1500, pink:5000, blue:10000, yellow:16000 };
const GH_PROBE  = 6;   // wall probe radius (px)

// Ghost house zone in SVG px — only EATEN ghosts may enter
const GH_ZONE = { x1:780, y1:1080, x2:1090, y2:1330 };

function posInGhostHouse(x, y){
  const sx=x/DRAW_SCALE, sy=y/DRAW_SCALE;
  return sx>GH_ZONE.x1 && sx<GH_ZONE.x2 && sy>GH_ZONE.y1 && sy<GH_ZONE.y2;
}

// Basic walkability check (wall only)
function ghostCanStep(x, y, dx, dy){
  const ahead = GH_PROBE * 2;
  const nx = x + dx*ahead, ny = y + dy*ahead, s = GH_PROBE;
  if(dx!==0){ const ex=nx+dx*s; return isWalkable(ex,ny-s)&&isWalkable(ex,ny)&&isWalkable(ex,ny+s); }
  else       { const ey=ny+dy*s; return isWalkable(nx-s,ey)&&isWalkable(nx,ey)&&isWalkable(nx+s,ey); }
}

// For ACTIVE/FRIGHTENED: also block re-entry into ghost house
function ghostCanStepActive(g, dx, dy){
  if(!ghostCanStep(g.x, g.y, dx, dy)) return false;
  // Block if next position enters ghost house zone
  const nx = g.x + dx*GH_PROBE*2;
  const ny = g.y + dy*GH_PROBE*2;
  if(posInGhostHouse(nx, ny)) return false;
  return true;
}

const _DIRS = [{dx:0,dy:-1},{dx:1,dy:0},{dx:0,dy:1},{dx:-1,dy:0}];

function ghostPickDir(g, dirs, tx, ty){
  // Frightened: maximize distance from player
  if(g.state==='FRIGHTENED'){
    let best=dirs[0], bestD=-Infinity;
    for(const d of dirs){
      const dd = Math.hypot(g.x+d.dx*40-player.x, g.y+d.dy*40-player.y);
      if(dd>bestD){bestD=dd; best=d;}
    }
    return best;
  }
  // Random chance for medium difficulty
  if(g.key==='blue'   && Math.random()<0.18) return dirs[Math.floor(Math.random()*dirs.length)];
  if(g.key==='yellow' && Math.random()<0.13) return dirs[Math.floor(Math.random()*dirs.length)];

  // Pick direction minimizing Euclidean distance to target (project 40px ahead)
  let best=dirs[0], bestD=Infinity;
  for(const d of dirs){
    const dd = Math.hypot(g.x+d.dx*40-tx, g.y+d.dy*40-ty);
    if(dd<bestD){bestD=dd; best=d;}
  }
  return best;
}

function stepGhost(g, dt, now){
  if(!g.state){g.state='IN_HOUSE'; g.dx=0; g.dy=-1; g._moved=0;}
  if(g.state==='ACTIVE'     && frightTimer>0) g.state='FRIGHTENED';
  if(g.state==='FRIGHTENED' && frightTimer<=0) g.state='ACTIVE';

  // ── IN HOUSE ──────────────────────────────────────────────────────
  if(g.state==='IN_HOUSE'){
    g.y = CHARS[g.key].cy*DRAW_SCALE + Math.sin(now*0.003)*5;
    if(now >= g.releaseAt) g.state='LEAVING';
    return;
  }
  // ── LEAVING ───────────────────────────────────────────────────────
  if(g.state==='LEAVING'){
    const ex=GH_EXIT.x*DRAW_SCALE, ey=GH_EXIT.y*DRAW_SCALE;
    const step=GH_SPD.LEAVE*dt, ddx=ex-g.x, ddy=ey-g.y, dist=Math.hypot(ddx,ddy);
    if(dist<step+3){g.x=ex; g.y=ey; g.state='ACTIVE'; g.dx=0; g.dy=-1; g._moved=0;}
    else{g.x+=ddx/dist*step; g.y+=ddy/dist*step;}
    return;
  }
  // ── EATEN ─────────────────────────────────────────────────────────
  if(g.state==='EATEN'){
    const tx=CHARS[g.key].cx*DRAW_SCALE, ty=CHARS[g.key].cy*DRAW_SCALE;
    const step=GH_SPD.RETURN*dt, ddx=tx-g.x, ddy=ty-g.y, dist=Math.hypot(ddx,ddy);
    if(dist<step+3){g.x=tx; g.y=ty; g.state='IN_HOUSE'; g.dx=0; g.dy=-1; g._moved=0; g.releaseAt=now+3000;}
    else{g.x+=ddx/dist*step; g.y+=ddy/dist*step;}
    return;
  }

  // ── ACTIVE / FRIGHTENED ───────────────────────────────────────────
  const spd = (g.state==='FRIGHTENED' ? GH_SPD.SCARED : GH_SPD.NORMAL) * dt;

  // Target for this ghost
  let tx=player.x, ty=player.y;
  if(g.key==='pink'){ tx=player.x+(player._dx||0)*70; ty=player.y+(player._dy||0)*70; }

  // Use ghostCanStepActive: walls + ghost house blocked for active ghosts
  const stepOk = (dx,dy) => ghostCanStepActive(g, dx, dy);

  // Can continue current direction?
  const canCont = (g.dx||g.dy) && stepOk(g.dx,g.dy);
  g._moved = (g._moved||0) + spd;

  // Is player behind the ghost?
  const behindDot = (tx-g.x)*(-g.dx) + (ty-g.y)*(-g.dy);
  const playerIsBehind = behindDot > 50;

  const shouldDecide = !canCont || g._moved > 16 || playerIsBehind;

  if(shouldDecide){
    g._moved = 0;
    const allDirs = _DIRS.filter(d => stepOk(d.dx,d.dy));
    if(allDirs.length===0) return;

    const noRev = allDirs.filter(d => !(d.dx===-g.dx && d.dy===-g.dy));
    const dirs  = (noRev.length > 0 && !playerIsBehind) ? noRev : allDirs;

    const ch = ghostPickDir(g, dirs, tx, ty);
    g.dx = ch.dx; g.dy = ch.dy;
  }

  if(stepOk(g.dx,g.dy)){g.x+=g.dx*spd; g.y+=g.dy*spd;}
}

function updateGhosts(dt,now){ for(const g of ghosts) stepGhost(g,dt,now); }

function initGhosts(baseTime){
  for(const g of ghosts){
    g.x=CHARS[g.key].cx*DRAW_SCALE; g.y=CHARS[g.key].cy*DRAW_SCALE;
    g.dx=0; g.dy=-1; g.state='IN_HOUSE'; g._moved=0;
    g.releaseAt=(baseTime||0)+GH_RELEASE[g.key];
  }
}

function checkGhostHits(now){
  for(const g of ghosts){
    if(g.state==='IN_HOUSE'||g.state==='LEAVING'||g.state==='EATEN') continue;
    if(Math.hypot(g.x-player.x,g.y-player.y) < CHARS[g.key].w*DRAW_SCALE*0.48+player.half*0.6){
      if(g.state==='FRIGHTENED'){
        g.state='EATEN'; score+=200;
      } else {
        lives--;
        player.x=CHARS.punk.cx*DRAW_SCALE; player.y=CHARS.punk.cy*DRAW_SCALE;
        player.dx=0; player.dy=0; player.ndx=0; player.ndy=0;
        initGhosts(firstMoveTime);
        if(lives<=0){gstate='GAME_OVER'; gameOverTimer=performance.now()+3500;}
        break;
      }
    }
  }
}

// ── Render ───────────────────────────────────────────────────
function drawJoy(){
  if(!joy.active) return;
  ctx.save();
  ctx.globalAlpha=0.28; ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(joy.baseX,joy.baseY,joy.R,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=0.55; ctx.strokeStyle='#fff'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(joy.baseX,joy.baseY,joy.R,0,Math.PI*2); ctx.stroke();
  ctx.globalAlpha=0.85; ctx.fillStyle='#94dbda';
  ctx.beginPath(); ctx.arc(joy.knobX,joy.knobY,joy.KR,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawHUD(){
  // Top bar
  const h=Math.round(CSS_H*0.042);
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,0,CSS_W,h);
  ctx.fillStyle='#94dbda';
  ctx.font=`bold ${Math.round(h*0.55)}px monospace`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('SCORE  '+score, CSS_W/2, h/2);
  const rem=points.filter(p=>!p.eaten).length;
  ctx.fillStyle='#ffffff99';
  ctx.font=`${Math.round(h*0.42)}px monospace`;
  ctx.textAlign='right';
  ctx.fillText('ETH: '+rem, CSS_W-8, h/2);
  if(frightTimer>0){
    ctx.fillStyle='#f283e1';
    ctx.fillRect((CSS_W-CSS_W*0.5)/2, h-3, CSS_W*0.5*(frightTimer/FRIGHT_MS), 3);
  }
  // 3 character icons in left gray column (punk=life3, pepe=life2, summer=life1)
  const chars3 = ['punk','pepe','summer'];
  const iconSz  = Math.round(CSS_W * 0.062);
  const iconX   = Math.round(CSS_W * 0.027);
  const iconGap = Math.round(CSS_H * 0.115);
  const iconTop = Math.round(CSS_H * 0.28);
  for(let i=0;i<3;i++){
    const key = chars3[i];
    const img = imgs[key];
    if(!img || !img.complete || img.naturalWidth===0) continue;
    const c   = CHARS[key];
    if(!c || !c.cx) continue;
    const sc  = iconSz / c.w;
    const iy  = iconTop + i*iconGap;
    const alive = (3-i) <= lives;
    ctx.save();
    ctx.globalAlpha = alive ? 1 : 0.25;
    ctx.beginPath();
    ctx.rect(iconX-iconSz/2-1, iy-iconSz/2-1, iconSz+2, iconSz+2);
    ctx.clip();
    ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';
    ctx.drawImage(img, iconX-c.cx*sc, iy-c.cy*sc, SVG_W*sc, SVG_H*sc);
    ctx.restore();
  }
}

function render(ts){
  ctx.drawImage(imgs.base, 0, 0, CSS_W, CSS_H);
  // SgtMan — appears when Brain collected, flies right→left
  if(sgt.phase==='FLYING' && imgs.sgtman && imgs.sgtman.complete){
    ctx.save();
    ctx.globalAlpha = sgt.alpha;
    ctx.translate(sgt.x, sgt.y);
    // No flip — SVG already oriented correctly (facing left)
    ctx.drawImage(imgs.sgtman,
      -SGTMAN.cx*DRAW_SCALE, -SGTMAN.cy*DRAW_SCALE,
      SVG_W*DRAW_SCALE, SVG_H*DRAW_SCALE);
    ctx.restore();
  }

  // Items (under characters)
  for(const p of points) if(!p.eaten) drawItem('point', p.x, p.y, true, 0.05);
  for(const b of brains) if(!b.eaten) drawItem('brain', b.x, b.y, true);
  // Characters
  for(const g of ghosts){
    if(g.state==='EATEN') continue; // only eyes visible
    if(g.state==='FRIGHTENED'){
      // Use scared ghost SVG — blinks near end
      const blink=frightTimer<2000&&Math.floor(performance.now()/200)%2===0;
      ctx.save();
      ctx.globalAlpha = blink ? 0.45 : 1.0;
      drawSVG('ghost_scared', SCARED.cx, SCARED.cy, g.x, g.y, false, false);
      ctx.restore();
    } else {
      drawChar(g.key, g.x, g.y, false);
    }
    // Draw eyes for EATEN ghosts (just eyes floating back)
  }
  for(const g of ghosts){
    if(g.state!=='EATEN') continue;
    const sz=CHARS[g.key].w*DRAW_SCALE;
    ctx.save(); ctx.globalAlpha=0.9;
    // White eyes
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.ellipse(g.x-sz*0.18, g.y-sz*0.1, sz*0.12, sz*0.15, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(g.x+sz*0.18, g.y-sz*0.1, sz*0.12, sz*0.15, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='#00f';
    ctx.beginPath(); ctx.ellipse(g.x-sz*0.18+g.dx*3, g.y-sz*0.1+g.dy*3, sz*0.06, sz*0.08, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(g.x+sz*0.18+g.dx*3, g.y-sz*0.1+g.dy*3, sz*0.06, sz*0.08, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
  // Switch character based on lives: 3=punk, 2=pepe, 1=summer
  const _chars3 = ['punk','pepe','summer'];
  const _ckey   = _chars3[Math.max(0,Math.min(2, 3-lives))];
  if(imgs[_ckey] && imgs[_ckey].complete && imgs[_ckey].naturalWidth>0)
    drawChar(_ckey, player.x, player.y, player.facingLeft);
  else
    drawChar('punk', player.x, player.y, player.facingLeft);
  drawJoy();
  drawHUD();

  // WAITING state hint
  if(gstate==='WAITING'){
    const h2=Math.round(CSS_H*0.042);
    ctx.save();
    ctx.globalAlpha=0.8+(Math.sin(ts*0.004)*0.2);
    ctx.fillStyle='#FFD700';
    ctx.font=`bold ${Math.round(CSS_H*0.025)}px monospace`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('PRESS ANY KEY TO START', CSS_W/2, CSS_H*0.92);
    ctx.restore();
  }

  // WIN overlay (SVG will replace this placeholder)
  if(gstate==='WIN'){
    ctx.fillStyle='rgba(0,0,0,0.72)';
    ctx.fillRect(0,0,CSS_W,CSS_H);
    drawPixelBig('YOU',    CSS_W/2, CSS_H/2 - CSS_H*0.10, '#FFD700');
    drawPixelBig('WIN!',   CSS_W/2, CSS_H/2 + CSS_H*0.02, '#FFD700');
    ctx.save();
    ctx.fillStyle='#94dbda';
    ctx.font=`${Math.round(CSS_H*0.022)}px monospace`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('SCORE: '+score, CSS_W/2, CSS_H/2 + CSS_H*0.14);
    ctx.restore();
    // Auto-restart after 4 seconds
    if(!winTimer) winTimer=performance.now()+4000;
    if(performance.now() >= winTimer){
      lives=3; score=0; gstate='WAITING'; firstMoveTime=0; winTimer=0;
      player.x=CHARS.punk.cx*DRAW_SCALE; player.y=CHARS.punk.cy*DRAW_SCALE;
      player.dx=0; player.dy=0; player.ndx=0; player.ndy=0;
      player._dx=0; player._dy=0;
      initGhosts(0); generateItems();
    }
  }

  // GAME OVER overlay
  if(gstate==='GAME_OVER'){
    ctx.fillStyle='rgba(0,0,0,0.72)';
    ctx.fillRect(0,0,CSS_W,CSS_H);
    drawPixelBig('SEIZE', CSS_W/2, CSS_H/2 - CSS_H*0.07, '#FF2222');
    drawPixelBig('OVER',  CSS_W/2, CSS_H/2 + CSS_H*0.04, '#FF2222');
    // Auto-restart
    if(performance.now() >= gameOverTimer){
      lives=3; score=0; gstate='WAITING'; firstMoveTime=0;
      player.x=CHARS.punk.cx*DRAW_SCALE; player.y=CHARS.punk.cy*DRAW_SCALE;
      player.dx=0; player.dy=0; player.ndx=0; player.ndy=0;
      player._dx=0; player._dy=0;
      initGhosts(0); generateItems();
    }
  }

  // WIN overlay
  if(gstate==='WIN'){
    ctx.fillStyle='rgba(0,0,0,0.72)';
    ctx.fillRect(0,0,CSS_W,CSS_H);
    drawPixelBig('YOU',   CSS_W/2, CSS_H/2 - CSS_H*0.10, '#94dbda');
    drawPixelBig('WIN!',  CSS_W/2, CSS_H/2 + CSS_H*0.01, '#FFD700');
    // Score display
    ctx.save();
    ctx.fillStyle='#ffffff'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=`${Math.round(CSS_H*0.028)}px monospace`;
    ctx.fillText('SCORE: '+score, CSS_W/2, CSS_H/2+CSS_H*0.12);
    ctx.restore();
    // Auto-restart after 4s
    if(performance.now() >= gameOverTimer){
      lives=3; score=0; gstate='WAITING'; firstMoveTime=0;
      player.x=CHARS.punk.cx*DRAW_SCALE; player.y=CHARS.punk.cy*DRAW_SCALE;
      player.dx=0; player.dy=0; player.ndx=0; player.ndy=0;
      player._dx=0; player._dy=0;
      initGhosts(0); generateItems();
    }
  }
}

// Pixel-art text: render small font scaled up with no smoothing
function drawPixelBig(text, cx, cy, color){
  const tmp=document.createElement('canvas');
  const charW=7, charH=9, gap=1;
  tmp.width=text.length*(charW+gap)+2;
  tmp.height=charH+2;
  const t=tmp.getContext('2d');
  t.font=`${charH}px "Courier New", monospace`;
  t.fillStyle=color;
  t.textBaseline='top';
  t.fillText(text, 1, 1);
  const scale=Math.round(CSS_W/60);  // scale so text fills ~60 chars width
  ctx.save();
  ctx.imageSmoothingEnabled=false;
  ctx.shadowColor=color;
  ctx.shadowBlur=8;
  ctx.drawImage(tmp,
    Math.round(cx - tmp.width*scale/2),
    Math.round(cy - tmp.height*scale/2),
    tmp.width*scale, tmp.height*scale);
  ctx.restore();
}

// ── Loop ─────────────────────────────────────────────────────
let gameStarted=false, lastTs=0;
function loop(ts){
  const dt=(ts-lastTs)/1000; lastTs=ts;
  update(dt); render(ts);
  requestAnimationFrame(loop);
}

function onAllLoaded(){
  if(gameStarted) return;
  gameStarted=true;
  resize(); rebuildMask(); generateItems();
  player.x    = CHARS.punk.cx * DRAW_SCALE;
  player.y    = CHARS.punk.cy * DRAW_SCALE;
  player.half = Math.round(CHARS.punk.w * DRAW_SCALE/2*0.75);
  initGhosts(0);  // release times set when player first moves
  initSgtMan();
  document.getElementById('loader').classList.add('hidden');
  requestAnimationFrame(ts=>{lastTs=ts; requestAnimationFrame(loop);});
}
loadImages();
</script>
